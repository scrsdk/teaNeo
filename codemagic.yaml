workflows:
  my-workflow:
    name: LUNARI
    labels:
      - QA
      - ${TENANT_NAME}
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - group_name
      vars:
        PUBLIC_ENV_VAR: "value here"
    cache:
      cache_paths:
        - ~/.pub-cache
    triggering:
      events:
        - push
        - pull_request
    scripts:
      - name: Build app
        script: |
          echo "Building..."
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - moxxxki@gmail.com

